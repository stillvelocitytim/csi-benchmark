# CSI Evaluation Harness — Daily at 06:00 UTC
# Schedule: daily for the first 30 days (through mid-April 2026),
# then switch cron to Mon/Wed/Fri: '0 6 * * 1,3,5'

name: Daily CSI Evaluation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation harness
        run: python -m harness.run_eval --workers 8

      - name: Compute CSI index
        run: python -m harness.compute_csi

      # Stallion patent (64/004,117) reduction-to-practice evidence:
      # This autonomous daily loop IS the closed-loop forward-prediction engine.
      # GH Actions logs serve as timestamped proof of continuous operation.
      # Forward predictions are printed to stdout and captured in the log artifact.
      - name: Compute forward curve (Stallion RTP — logged predictions)
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          echo "========== STALLION RTP: Forward prediction run — $(date -u +%Y-%m-%dT%H:%M:%SZ) =========="
          python -m harness.compute_forward
          echo "========== STALLION RTP: Forward prediction complete =========="

  # --- Retry: if the eval job fails, wait 10 min and try again once ---
  retry:
    runs-on: ubuntu-latest
    needs: evaluate
    if: failure()
    timeout-minutes: 360

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Wait before retry
        run: sleep 600

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation harness (retry)
        run: python -m harness.run_eval --workers 8

      - name: Compute CSI index (retry)
        run: python -m harness.compute_csi

      - name: Compute forward curve (retry)
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          echo "========== STALLION RTP: Forward prediction run (RETRY) — $(date -u +%Y-%m-%dT%H:%M:%SZ) =========="
          python -m harness.compute_forward
          echo "========== STALLION RTP: Forward prediction complete =========="

  # --- Notify on failure (after retry exhausted) ---
  notify-failure:
    runs-on: ubuntu-latest
    needs: [evaluate, retry]
    if: failure()

    steps:
      - name: Create GitHub issue for missed day
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Daily eval FAILED — ${today}`,
              body: [
                `The daily CSI evaluation pipeline failed on **${today}** after one retry.`,
                '',
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Please run manually:',
                '```',
                'python -m harness.run_eval --workers 8',
                'python -m harness.compute_csi',
                'python -m harness.compute_forward',
                '```',
              ].join('\n'),
              labels: ['eval-failure'],
            });

      - name: Send SMS via ntfy
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        if: env.NTFY_TOPIC != ''
        run: |
          curl -s \
            -H "Title: CSI eval FAILED — $(date -u +%Y-%m-%d)" \
            -H "Priority: urgent" \
            -H "Tags: rotating_light" \
            -d "Daily eval pipeline failed after retry. Check GitHub Actions and run manually." \
            "https://ntfy.sh/${NTFY_TOPIC}"
