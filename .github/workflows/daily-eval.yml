# CSI Evaluation Harness — Daily at 06:00 UTC
# Schedule: daily for the first 30 days (through mid-April 2026),
# then switch cron to Mon/Wed/Fri: '0 6 * * 1,3,5'

name: Daily CSI Evaluation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation harness
        run: python -m harness.run_eval

      - name: Compute CSI index
        run: python -m harness.compute_csi

      - name: Compute forward curve
        continue-on-error: true
        run: python -m harness.compute_forward
